<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ben Letchford – Software Engineer</title>
    <meta
      name="description"
      content="Software engineer. Rust, Python, systems programming, and web tools."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        font-size: clamp(12px, calc(12px + 4 * ((100vw - 320px) / 680)), 20px);
      }
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #fff;
        color: #333;
        padding: 3rem 1.5rem;
      }
      .content {
        max-width: 640px;
        margin: 0 auto;
      }
      header {
        margin-bottom: 2.5rem;
      }
      header h1 {
        font-size: 2.8rem;
        margin-bottom: 0.3rem;
      }
      header .subtitle {
        font-size: 1.1rem;
        font-weight: 400;
        color: #666;
      }
      section {
        margin-bottom: 2.5rem;
      }
      section h2 {
        font-size: 1.3rem;
        margin-bottom: 0.8rem;
        color: #333;
      }
      .project-list {
        list-style: none;
      }
      .project-list li {
        margin-bottom: 0.5rem;
      }
      .project-list a {
        text-decoration: none;
        color: inherit;
        transition: color 0.2s ease;
        position: relative;
      }
      .project-list a:hover {
        color: #0073e6;
      }
      .project-list .desc {
        color: #999;
        font-size: 0.8rem;
        margin-left: 0.3rem;
      }
      .project-list a:hover .desc {
        color: #6ab0f3;
      }
      .papers-list {
        list-style: none;
      }
      .papers-list li {
        margin-bottom: 0.5rem;
      }
      .papers-list a {
        text-decoration: none;
        color: inherit;
        transition: color 0.2s ease;
      }
      .papers-list a:hover {
        color: #0073e6;
      }
      .papers-list .venue {
        color: #999;
        font-size: 0.8rem;
        margin-left: 0.3rem;
      }
      footer {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #eee;
      }
      footer .links a {
        margin-right: 1.2rem;
        text-decoration: none;
        color: inherit;
        font-size: 0.9rem;
        transition: color 0.2s ease;
      }
      footer .links a:hover {
        color: #0073e6;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <header>
        <h1>Ben Letchford</h1>
      </header>

      <section id="projects">
        <h2>Projects</h2>
        <ul class="project-list"></ul>
      </section>

      <section id="papers">
        <h2>Papers</h2>
        <ul class="papers-list"></ul>
      </section>

      <script>
        const projects = [
          {
            name: "stratego.io",
            url: "https://stratego.io",
            desc: "Multiplayer HTML5 recreation of the classic game of Stratego as a Rust web app",
          },
          {
            name: "m68k-rs",
            url: "https://github.com/benletchford/m68k-rs",
            desc: "Pure Rust implementation of the Motorola 68000 family of CPUs",
          },
          {
            name: "unmovable",
            url: "https://github.com/benletchford/unmovable",
            desc: "Cross-platform React Native rush hour style puzzle game",
          },
          {
            name: "buup.io",
            url: "https://buup.io/",
            desc: "Text transformation toolkit in pure Rust: encoding, crypto, compression & more",
          },
          {
            name: "stuffit-rs",
            url: "https://github.com/benletchford/stuffit-rs",
            desc: "High performance Rust library and CLI for reading and writing StuffIt (.sit) archives",
          },
        ];

        const papers = [];

        const projectList = document.querySelector("#projects .project-list");
        projects.forEach((p) => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = p.url;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = p.name + " ";
          const span = document.createElement("span");
          span.className = "desc";
          span.textContent = "– " + p.desc;
          a.appendChild(span);
          li.appendChild(a);
          projectList.appendChild(li);
        });

        const papersSection = document.getElementById("papers");
        if (papers.length === 0) {
          papersSection.remove();
        } else {
          const paperList = papersSection.querySelector(".papers-list");
          papers.forEach((p) => {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = p.url;
            a.target = "_blank";
            a.rel = "noopener";
            a.textContent = p.name + " ";
            if (p.venue) {
              const span = document.createElement("span");
              span.className = "venue";
              span.textContent = "– " + p.venue;
              a.appendChild(span);
            }
            li.appendChild(a);
            paperList.appendChild(li);
          });
        }
      </script>

      <footer>
        <div class="links">
          <a href="mailto:ben@letchford.cloud">Email</a>
          <a
            href="https://github.com/benletchford"
            target="_blank"
            rel="noopener"
            >GitHub</a
          >
          <a
            href="https://www.linkedin.com/in/benletchford"
            target="_blank"
            rel="noopener"
            >LinkedIn</a
          >
        </div>
      </footer>
    </div>
  </body>
</html>
